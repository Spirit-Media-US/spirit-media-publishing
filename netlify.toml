[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  PUBLIC_SITE_URL = "https://spiritmediapublishing.com"
  NODE_VERSION = "20"
  NPM_FLAGS = "--prefer-offline"

# Cache node_modules and Astro build cache between deploys
# This is the biggest credit saver — avoids reinstalling from scratch
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Branch preview deployments — full build, no www redirect
[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://cdn.sanity.io https://assets.spiritmediapublishing.com https://*.google-analytics.com https://*.googletagmanager.com; connect-src 'self' https://pmowd8uo.api.sanity.io https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com https://mail.spiritmediaone.com; media-src 'self' https://cdn.sanity.io; object-src 'none'; base-uri 'self'; form-action 'self' https://mail.spiritmediaone.com"

# Redirect www to non-www
[[redirects]]
  from = "https://www.spiritmediapublishing.com/*"
  to = "https://spiritmediapublishing.com/:splat"
  status = 301
  force = true
